<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Document</title>
	<style>
	body{
		background: #ccc;
	}
		.j-progress{
			position: relative;
		    height: 34px;
		    padding: 15px 10px 0;
		    overflow: hidden;
		}
		

		.progress{
			position: absolute;
			height: 10px;
			width: 400px;
			background-color:rgba(255, 255, 255, 0.8);
			border-radius: 5px;
		}
		.scrollbar{
			position: absolute;
		    top: 0;
		    left: 0;
		    right: 0;
		    height: 100%;
		}
		.in{
			position: absolute;
		    top: -8px;
		    right: -12px;
		    display: block;
		    width: 24px;
		    height: 24px;
		    background:url(data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABQAAAAUCAMAAAC6V+0/AAAATlBMVEUAAABWVlYAAAAAAAAAAAAAAACsrKxHcEwAAAAAAAAAAAD+/v7Ozs4AAAD7+/vw8PDw8PD8/Pz7+/vLy8v////AMjy4JSW/MTvsusLsucFa/UGuAAAAFHRSTlMBPQ4jFwl7AAIGJ/unHPbe4Pb0o5pnj40AAACeSURBVBjTbZGLDsMgCEVRwRbta13t4/9/dKDtXDJvouSeYHgIXRb0WXC7gpiZSK6CoTCLLgSHtlA5wIRmWGKcB4PESiSPRr9uWasfSXKh6xn99pVH7jsAtmaqcDKWQYrgsP3oLakC3aLmTOnUODuFFKKatO9JYwyU4euGR4XsZjXXka76vFWo2VKz+TLmnTs9Y9aFLHUh7dW1l/z3HR9NnRFrL1EwZQAAAABJRU5ErkJggg==) no-repeat center
		}
		
		.j-in{
			border-radius: 5px;
			top: 0;
			left: 0;
			position: absolute;
			height: 10px;
			width: 0;
			background-color: red; 
			
		}
	</style>
	<link rel="stylesheet" type="text/css" href="css/extend.css">
</head>
<body>
	
	<div class="j-progress">

		<div class="progress">
			<div class="j-in">
				<div class="scrollBar"><span class="in"></span></div>
			</div>
		</div>
		
		
		
	</div>	
	<script>

		var progress = document.querySelectorAll(".progress")[0];
		var scrollBar = document.querySelectorAll(".in")[0];
		var j_in = document.querySelectorAll(".j-in")[0];
		var num = 100/progress.offsetWidth;
		console.log(progress.offsetWidth);


		// 拖动滚动条封装
		function playBarScroll(obj){
			var x = event.clientX - obj.offsetLeft; //x=(鼠标当前X坐标-滚动按钮到父级盒子的距离)
			var w = scrollBar.offsetWidth/2
			console.log(x);
			var that = obj;
			document.onmousemove = function(event){
				var scrollLeft = event.clientX - x; //(鼠标当前X坐标 - x) = 按钮的实际距离  
				if(scrollLeft<-w){
					scrollLeft=-w;
					console.log("1");
				}
				else if(scrollLeft>progress.offsetWidth){
					scrollLeft = progress.offsetWidth - w;
					console.log("2");
				}
				progressWidth = scrollLeft + w; //进度条长度
				j_in.style.width = (num*progressWidth) + '%';
				window.getSelection ? window.getSelection().removeAllRanges():document.selection.empty();
			}
			document.onmouseup = function(){
				document.onmousemove = null;
			}
		}

		function playBarClick(obj){
			var x = event.clientX - obj.offsetParent.offsetLeft;
			scrollBar.style.left = x - scrollBar.offsetWidth/2 + "px";
			console.log(scrollBar.style.left);
			j_in.style.width = (x - scrollBar.offsetWidth/2)*num + '%';
			console.log(obj.offsetParent.offsetLeft);
		}

		scrollBar.onmousedown = function(){
			
			playBarScroll(this);
		}
		// scroll.onclick = function(){
		// 	playBarClick(this);
		// }
		// j-in.onclick = function(){
		// 	playBarClick(this);
		// }


	</script>
</body>
</html>
